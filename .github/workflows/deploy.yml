name: Deploy Docs

on:
  push:
    branches: [main]
  gollum:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki
        run: git clone https://github.com/${{ github.repository }}.wiki.git wiki/ || echo "Wiki not found, skipping"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marked
        run: npm install marked --no-save

      - name: Generate docs
        env:
          DOCS_TITLE: "blazor-mudblazor-starter"
          DOCS_DESCRIPTION: "Blazor Server starter template with MudBlazor Material Design components — .NET 9, Docker, and Azure CI/CD ready"
          GITHUB_URL: "https://github.com/jonathanperis/blazor-mudblazor-starter"
          LIVE_URL: "https://blazor-mudblazor-starter-hmdqebc9f4eneeep.brazilsouth-01.azurewebsites.net/"
          OUTPUT_PATH: "docs/docs/index.html"
          TEMPLATE_PATH: ".github/docs-template.html"
        run: node .github/generate-docs.js

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v5
